name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint and test tooling
        run: python -m pip install --upgrade pip ruff pytest

      - name: Run lint checks
        run: ruff check --select E9,F63,F7,F82 .

      - name: Verify Python compilation
        run: python -m compileall -q omega-prime-ros

  smoke-test:
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Build Docker image for smoke test
        run: docker build -t omega-prime-ros:ci -f Dockerfile .

      - name: Run conversion smoke test
        run: |
          rm -rf "$PWD/output-ci"
          mkdir -p "$PWD/output-ci"
          echo "Processing the example input files:"
          find "$PWD/example" -maxdepth 3 -type f | sort
          docker run --rm \
            -e EGO_DATA_TOPIC=/simulation/ego_data \
            -e OBJECT_LIST_TOPIC=/simulation/object_list \
            -v "$PWD/example:/input" \
            -v "$PWD/output-ci:/output" \
            omega-prime-ros:ci
          echo "Resulting files:"
          find "$PWD/output-ci" -maxdepth 2 -type f | sort
          out_file="$(find "$PWD/output-ci" -maxdepth 1 -name '*.omega-prime.mcap' -type f -print -quit)"
          if [ -z "$out_file" ]; then
            echo "No omega-prime output generated"
            exit 1
          fi
          test -s "$out_file"

  docker-build-and-publish:
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lower case image name
        id: image
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
